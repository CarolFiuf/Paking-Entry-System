# /etc/nginx/nginx.conf (thêm vào cuối file)
# Hoặc tạo /etc/nginx/rtmp.conf rồi include

# sudo apt install nginx libnginx-mod-rtmp
# sudo systemctl restart nginx

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # ── Giảm latency ──
            gop_cache off;          # Bỏ GOP cache: giảm ~1-2s delay
            idle_streams off;       # Đóng stream idle
            wait_key on;            # Đợi keyframe đầu tiên trước khi gửi
            interleave on;          # Interleave audio/video

            # ── Optional: giới hạn ──
            # max_connections 4;    # Tối đa 4 stream cùng lúc
            # drop_idle_publisher 10s;  # Drop publisher idle >10s
        }
    }
}
