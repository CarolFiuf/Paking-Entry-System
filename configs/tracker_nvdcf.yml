%YAML:1.0
####################################################################################################
# NvDCF tracker config — Face cam parking
# Tuned từ config_tracker_NvDCF_perf.yml:
#   - maxShadowTrackingAge: 51 → 8  (chống re-assign track_id của xe trước
#                                     cho xe sau)
#   - maxTargetsPerStream: 150 → 20  (face cam thường < 5 targets)
#   - minDetectorConfidence: 0.043 → 0.3 (SCRFD live parking faces can be
#                                          small/angled; parser already filters)
####################################################################################################

BaseConfig:
  minDetectorConfidence: 0.3

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 20

  minIouDiff4NewTarget: 0.7418
  minTrackerConfidence: 0.4009
  probationAge: 2
  maxShadowTrackingAge: 8
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 1

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1
  checkClassMatch: 1

  minMatchingScore4Overall: 0.4290
  minMatchingScore4SizeSimilarity: 0.3627
  minMatchingScore4Iou: 0.2575
  minMatchingScore4VisualSimilarity: 0.5356

  matchingScoreWeight4VisualSimilarity: 0.3370
  matchingScoreWeight4SizeSimilarity: 0.4354
  matchingScoreWeight4Iou: 0.3656

  tentativeDetectorConfidence: 0.2008
  minMatchingScore4TentativeIou: 0.5296

StateEstimator:
  stateEstimatorType: 1
  processNoiseVar4Loc: 1.5110
  processNoiseVar4Size: 1.3159
  processNoiseVar4Vel: 0.0300
  measurementNoiseVar4Detector: 3.0283
  measurementNoiseVar4Tracker: 8.1505

VisualTracker:
  # 0=Dummy (Kalman-only). NvDCF visualTrackerType=1 crash với
  # cuDCFFrameTransformTexture.cu:693 GPUassert trên Jetson Orin Nano build
  # hiện tại. Loại bỏ visual feature extraction giúp tracker chạy ổn — đủ
  # cho parking 1-2 face đồng thời (IoU + Kalman state).
  visualTrackerType: 0
  useColorNames: 1
  useHog: 0
  featureImgSizeLevel: 2
  featureFocusOffsetFactor_y: -0.2000
  filterLr: 0.0750
  filterChannelWeightsLr: 0.1000
  gaussianSigma: 0.7500
